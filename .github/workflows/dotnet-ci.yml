name: dotnet-ci

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          include-prerelease: true

      - name: Restore
        run: dotnet restore SimsDesktopTools.sln

      - name: Build
        run: dotnet build SimsDesktopTools.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SimsDesktopTools.sln --configuration Release --no-build --verbosity minimal
